services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nasflix_production}
      MYSQL_USER: ${MYSQL_USER:-nasflix}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build: .
    restart: always
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=mysql2://root:${MYSQL_ROOT_PASSWORD}@db/${MYSQL_DATABASE:-nasflix_production}
      - NASFLIX_DATABASE_PASSWORD=${MYSQL_PASSWORD}
      - DB_HOST=db
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    ports:
      - "8080:80"
    volumes:
      - ./storage:/rails/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
